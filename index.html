<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pedidos Profesional</title>
    <!-- Tailwind CSS para diseño ágil y responsivo -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen flex flex-col justify-between">

    <header class="bg-blue-900 text-white shadow-md p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">Portal de Pedidos</h1>
            <span class="text-sm bg-blue-800 px-3 py-1 rounded text-blue-200">En línea</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 w-full flex-grow">
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold mb-4 text-gray-800 border-b pb-2">Detalles de tu Solicitud</h2>
            
            <form id="formPedido" class="space-y-4">
                <!-- Nombre del Cliente -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo *</label>
                    <input type="text" id="cliente" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Teléfono de Contacto -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono de Contacto *</label>
                    <input type="tel" id="telefono" required placeholder="Ej. 833 4519001"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Dirección de Entrega -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Dirección de Entrega</label>
                    <input type="text" id="direccion" placeholder="Dejar vacío si recoge en sucursal"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Detalles del Pedido -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Artículos / Especificaciones del Pedido *</label>
                    <textarea id="detallesPedido" rows="4" required placeholder="Detalla los productos que deseas ordenar..."
                              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <!-- Total Estimado -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Monto Total Estimado ($) *</label>
                    <input type="number" id="total" step="0.01" required min="0"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Botón de Envío -->
                <div class="pt-2">
                    <button type="submit" id="btnEnviar" 
                            class="w-full bg-blue-600 text-white font-medium py-2.5 px-4 rounded-md hover:bg-blue-700 transition duration-200 cursor-pointer disabled:bg-gray-400">
                        Confirmar y Enviar Pedido
                    </button>
                </div>
            </form>

            <!-- Contenedor de Estado / Notificaciones -->
            <div id="mensajeEstado" class="mt-4 p-4 rounded-md hidden"></div>
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-400 text-xs text-center p-4 mt-8">
        <p>&copy; 2026 Portal de Pedidos Automatizado. Todos los derechos reservados.</p>
        <p class="mt-1">Contacto de Soporte Técnico: <span class="text-gray-300 font-mono">833 4519001</span></p>
    </footer>

    <script>
        // REEMPLAZA ESTA URL con el enlace exacto que te proporcionó Google Apps Script al implementar
        const WEB_APP_URL = "https://script.google.com/macros/s/XXXXXX/exec";

        document.getElementById('formPedido').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnEnviar = document.getElementById('btnEnviar');
            const mensajeEstado = document.getElementById('mensajeEstado');
            
            // Bloquear interfaz para evitar doble envío
            btnEnviar.disabled = true;
            btnEnviar.innerText = "Procesando pedido, por favor espere...";
            
            // Ocultar estados anteriores
            mensajeEstado.classList.add('hidden');
            mensajeEstado.className = "mt-4 p-4 rounded-md hidden"; 

            // Recolección de datos del formulario
            const payload = {
                cliente: document.getElementById('cliente').value.trim(),
                telefono: document.getElementById('telefono').value.trim(),
                direccion: document.getElementById('direccion').value.trim(),
                detallesPedido: document.getElementById('detallesPedido').value.trim(),
                total: document.getElementById('total').value
            };

            try {
                // Ejecución de la llamada asíncrona hacia el backend en Google Sheets
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Requerido debido a la arquitectura de redirección de Apps Script
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                // Nota: Con mode: 'no-cors', no podemos leer el cuerpo de la respuesta ni el estatus HTTP directamente.
                // Si la promesa se resuelve sin caer en el 'catch', se asume que el servidor recibió los datos correctamente.
                
                mensajeEstado.innerText = "¡Pedido enviado con éxito! Nos comunicaremos contigo a la brevedad.";
                mensajeEstado.classList.remove('hidden');
                mensajeEstado.classList.add('bg-green-50', 'text-green-800', 'border', 'border-green-200');
                
                // Limpiar el formulario
                document.getElementById('formPedido').reset();

            } catch (error) {
                console.error("Error al enviar el pedido:", error);
                mensajeEstado.innerText = "Ocurrió un problema de conexión. Por favor, intenta de nuevo o comunícate al 833 4519001.";
                mensajeEstado.classList.remove('hidden');
                mensajeEstado.classList.add('bg-red-50', 'text-red-800', 'border', 'border-red-200');
            } finally {
                // Reactivar botón
                btnEnviar.disabled = false;
                btnEnviar.innerText = "Confirmar y Enviar Pedido";
            }
        });
    </script>
</body>
</html>
